<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

    <style>
body{
    margin:0;
    padding:0;

    background:linear-gradient(
        135deg,
        #071739,
        #0b1f4d,
        #102c70
    );

    font-family:'Poppins',sans-serif;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{

    width:420px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.4);

    text-align:center;
}

.login-container h1{

    color:white;

    margin-bottom:10px;

    font-size:38px;
}

.login-container::before{

    content:"📊";

    font-size:60px;

    display:block;

    margin-bottom:15px;
}

.login-container input{

    width:100%;

    padding:15px;

    margin:12px 0;

    border:none;

    border-radius:10px;

    background:#f5f5f5;

    box-sizing:border-box;

    font-size:16px;
}

.login-container input:focus{

    outline:none;

    box-shadow:
    0 0 15px #29b6f6;
}

.login-btn{

    width:100%;

    padding:15px;

    margin-top:10px;

    border:none;

    border-radius:10px;

    background:#29b6f6;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 0 25px #29b6f6;
}

.error{

    background:#dc3545;

    color:white;

    padding:12px;

    border-radius:8px;

    margin-bottom:15px;
}
    </style>
</head>

<body>

<div class="login-container">

    <h1>Sales Analytics</h1>

<p style="color:#b8c7e0;">
    Welcome Back Admin
</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button
            type="submit"
            class="login-btn">
            Login
        </button>

    </form>

</div>

</body>
</html>
